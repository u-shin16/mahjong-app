<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>まーじゃんしよか</title>
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16x16.png') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32x32.png') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
  <meta name="theme-color" content="#0b5a2d">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="app-header" id="appHeader">
    <div class="header-inner">
      <button class="btn-back hidden" id="btnBack">← もどる</button>
      <div class="header-title" id="headerTitle">🀄 まーじゃんしよか</div>
      <button class="btn-progress" id="btnProgress">📊 進捗</button>
      <button class="btn-progress btn-account" id="btnAccount">👤 ログイン</button>
    </div>
  </header>

  <main class="app-main" id="appMain"></main>

  <div class="overlay hidden" id="overlay">
    <div class="overlay-inner" id="overlayInner"></div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="{{ url_for('static', filename='js/tiles.js') }}"></script>
  <script src="{{ url_for('static', filename='js/agari.js') }}"></script>
  <script src="{{ url_for('static', filename='js/data.js') }}"></script>
  <script src="{{ url_for('static', filename='js/chapters.js') }}"></script>
  <script src="{{ url_for('static', filename='js/battle.js') }}"></script>
  <!-- Firebase（ログイン・進捗のクラウド保存） -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
  <script src="{{ url_for('static', filename='js/friend.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
